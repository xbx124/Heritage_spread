<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗文化数字化传播 · 管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>

<body class="dashboard-body">

    <div id="app-container">
        <!-- ==================== 侧边栏 ==================== -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <span class="sidebar-logo-icon">文</span>
                    <span class="sidebar-logo-text">非遗文化传播</span>
                </div>
            </div>
            <nav>
                <div class="nav-group">
                    <span class="nav-group-title">基础数据展示</span>
                    <a href="javascript:showPage('categories')" class="nav-item" data-page="categories">非遗分类</a>
                    <a href="javascript:showPage('projects')" class="nav-item" data-page="projects">非遗项目</a>
                    <a href="javascript:showPage('inheritors')" class="nav-item" data-page="inheritors">传承人</a>
                </div>
                <div class="nav-group">
                    <span class="nav-group-title">文化资讯</span>
                    <a href="javascript:showPage('news')" class="nav-item" data-page="news">资讯列表</a>
                    <a href="javascript:showPage('news-create')" class="nav-item admin-only editor-only"
                        data-page="news-create">发布资讯</a>
                </div>
                <div class="nav-group admin-only">
                    <span class="nav-group-title">传播渠道管理</span>
                    <a href="javascript:showPage('channels')" class="nav-item admin-only" data-page="channels">渠道管理</a>
                </div>
                <div class="nav-group">
                    <span class="nav-group-title">数据统计分析</span>
                    <a href="javascript:showPage('stats')" class="nav-item" data-page="stats">传播数据统计</a>
                </div>
            </nav>
            <div class="sidebar-user" id="sidebar-user"></div>
        </aside>

        <!-- ==================== 主内容区 ==================== -->
        <main id="main-content">
            <!-- ========== 非遗分类 ========== -->
            <section id="page-categories" class="page">
                <div class="page-header">
                    <h2>非遗分类管理</h2>
                    <button class="btn btn-filled admin-only" onclick="showCategoryForm()">新增分类</button>
                </div>
                <div id="categories-list"></div>
                <div class="pagination-bar" id="cat-pagination" style="display:none">
                    <span id="cat-page-info"></span>
                    <button class="btn btn-sm" onclick="changeCatPage(-1)">上一页</button>
                    <button class="btn btn-sm" onclick="changeCatPage(1)">下一页</button>
                </div>
            </section>

            <!-- ========== 非遗项目 ========== -->
            <section id="page-projects" class="page" style="display:none">
                <div class="page-header">
                    <h2>非遗项目</h2>
                    <button class="btn btn-filled admin-only editor-only" onclick="showProjectForm()">新增项目</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="proj-keyword" placeholder="搜索项目名称..." />
                    <select id="proj-category-filter">
                        <option value="">全部分类</option>
                    </select>
                    <input type="text" id="proj-area-filter" placeholder="地区..." />
                    <button class="btn btn-outline" onclick="loadProjects()">查询</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>分类</th>
                                <th>地区</th>
                                <th>传承人</th>
                                <th>时间</th>
                                <th class="action-col">操作</th>
                            </tr>
                        </thead>
                        <tbody id="projects-tbody"></tbody>
                    </table>
                </div>
                <div class="pagination-bar">
                    <span id="proj-page-info"></span>
                    <button class="btn btn-sm" onclick="changeProjPage(-1)">上一页</button>
                    <button class="btn btn-sm" onclick="changeProjPage(1)">下一页</button>
                </div>
            </section>

            <!-- ========== 项目详情 ========== -->
            <section id="page-project-detail" class="page" style="display:none">
                <button class="btn btn-back" onclick="showPage('projects')">← 返回列表</button>
                <div id="project-detail-content"></div>
            </section>

            <!-- ========== 传承人 ========== -->
            <section id="page-inheritors" class="page" style="display:none">
                <div class="page-header">
                    <h2>传承人</h2>
                    <button class="btn btn-filled admin-only editor-only" onclick="showInheritorForm()">新增</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="inh-keyword" placeholder="搜索姓名..." />
                    <select id="inh-project-filter">
                        <option value="">全部项目</option>
                    </select>
                    <button class="btn btn-outline" onclick="loadInheritors()">查询</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>项目</th>
                                <th>年限</th>
                                <th class="action-col">操作</th>
                            </tr>
                        </thead>
                        <tbody id="inheritors-tbody"></tbody>
                    </table>
                </div>
                <div class="pagination-bar">
                    <span id="inh-page-info"></span>
                    <button class="btn btn-sm" onclick="changeInhPage(-1)">上一页</button>
                    <button class="btn btn-sm" onclick="changeInhPage(1)">下一页</button>
                </div>
            </section>

            <!-- ========== 传承人详情 ========== -->
            <section id="page-inheritor-detail" class="page" style="display:none">
                <button class="btn btn-back" onclick="showPage('inheritors')">← 返回列表</button>
                <div id="inheritor-detail-content"></div>
            </section>

            <!-- ========== 资讯列表 ========== -->
            <section id="page-news" class="page" style="display:none">
                <div class="page-header">
                    <h2>文化资讯</h2>
                </div>
                <div id="news-list"></div>
                <div class="pagination-bar">
                    <span id="news-page-info"></span>
                    <button class="btn btn-sm" onclick="changeNewsPage(-1)">上一页</button>
                    <button class="btn btn-sm" onclick="changeNewsPage(1)">下一页</button>
                </div>
            </section>

            <!-- ========== 资讯详情 ========== -->
            <section id="page-news-detail" class="page" style="display:none">
                <button class="btn btn-back" onclick="showPage('news')">← 返回列表</button>
                <div id="news-detail-content"></div>
                <div id="news-comments"></div>
            </section>

            <!-- ========== 发布/编辑资讯 ========== -->
            <section id="page-news-create" class="page admin-only editor-only" style="display:none">
                <h2 id="news-form-title">发布资讯</h2>
                <form id="news-form" onsubmit="saveNews(event)">
                    <input type="hidden" id="news-edit-id" />
                    <div class="input-group"><input type="text" id="news-title" placeholder="标题" required /></div>
                    <div class="input-group"><input type="text" id="news-summary" placeholder="摘要（可选）" /></div>
                    <div class="input-group"><textarea id="news-content" rows="12" placeholder="正文..."
                            required></textarea></div>
                    <button type="submit" class="btn btn-filled">发布</button>
                </form>
            </section>

            <!-- ========== 渠道管理 ========== -->
            <section id="page-channels" class="page admin-only" style="display:none">
                <div class="page-header">
                    <h2>传播渠道管理</h2>
                    <button class="btn btn-filled" onclick="showChannelForm()">新增渠道</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>类型</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="channels-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- ========== 数据统计 ========== -->
            <section id="page-stats" class="page" style="display:none">
                <h2>传播数据统计分析</h2>
                <div class="chart-row">
                    <div class="chart-box">
                        <h3>各渠道浏览/曝光</h3>
                        <div id="chart-channel" style="height:350px;"></div>
                    </div>
                    <div class="chart-box">
                        <h3>各项目浏览/曝光</h3>
                        <div id="chart-project" style="height:350px;"></div>
                    </div>
                </div>
                <div class="chart-row">
                    <div class="chart-box">
                        <h3>渠道浏览量分布</h3>
                        <div id="chart-channel-pie" style="height:350px;"></div>
                    </div>
                    <div class="chart-box">
                        <h3>项目曝光量对比</h3>
                        <div id="chart-project-bar" style="height:350px;"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ==================== 弹窗：分类 ==================== -->
    <div id="category-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3 id="category-modal-title">新增分类</h3>
            <form onsubmit="saveCategory(event)">
                <input type="hidden" id="cat-edit-id" />
                <div class="input-group"><input type="text" id="cat-name" placeholder="分类名称" required /></div>
                <div class="input-group"><textarea id="cat-desc" placeholder="描述" rows="3"></textarea></div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-filled">保存</button>
                    <button type="button" class="btn btn-outline" onclick="closeCategoryModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== 弹窗：项目 ==================== -->
    <div id="project-modal" class="modal" style="display:none">
        <div class="modal-content modal-lg">
            <h3 id="proj-modal-title">新增非遗项目</h3>
            <form onsubmit="saveProject(event)">
                <input type="hidden" id="proj-edit-id" />
                <div class="input-group"><input type="text" id="proj-name" placeholder="项目名称" required /></div>
                <div class="input-group"><select id="proj-category" required></select></div>
                <div class="input-group"><input type="text" id="proj-area" placeholder="所属地区" /></div>
                <div class="input-group"><textarea id="proj-intro" rows="5" placeholder="项目介绍"></textarea></div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-filled">保存</button>
                    <button type="button" class="btn btn-outline" onclick="closeProjectModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== 弹窗：传承人 ==================== -->
    <div id="inheritor-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3 id="inh-modal-title">新增传承人</h3>
            <form onsubmit="saveInheritor(event)">
                <input type="hidden" id="inh-edit-id" />
                <div class="input-group"><input type="text" id="inh-name" placeholder="姓名" required /></div>
                <div class="input-group"><select id="inh-project" required></select></div>
                <div class="input-group"><input type="number" id="inh-years" placeholder="从业年限" value="0" min="0" />
                </div>
                <div class="input-group"><textarea id="inh-intro" rows="4" placeholder="简介"></textarea></div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-filled">保存</button>
                    <button type="button" class="btn btn-outline" onclick="closeInheritorModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== 弹窗：渠道 ==================== -->
    <div id="channel-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3 id="ch-modal-title">新增渠道</h3>
            <form onsubmit="saveChannel(event)">
                <input type="hidden" id="ch-edit-id" />
                <div class="input-group"><input type="text" id="ch-name" placeholder="渠道名称" required /></div>
                <div class="input-group"><input type="text" id="ch-type" placeholder="渠道类型" required /></div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-filled">保存</button>
                    <button type="button" class="btn btn-outline" onclick="closeChannelModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
